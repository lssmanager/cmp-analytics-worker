name = "cmp-analytics-worker"
main = "worker.js"
compatibility_date = "2024-11-01"
workers_dev = true

routes = [
  { pattern = "www.learnsocialstudies.com/*", zone_name = "learnsocialstudies.com" }
]

[[kv_namespaces]]
binding = "CONSENT_KV"
id      = "76af2f817a7749cf83b9e3993f7340cb"

[[kv_namespaces]]
binding = "ANALYTICS"
id      = "26ab20d559c249798b2764c2642c25f6"

[vars]
GA4_MEASUREMENT_ID = ""
GOOGLE_ADS_ID = ""

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
