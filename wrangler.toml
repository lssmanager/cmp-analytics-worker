name = "cmp-analytics-worker"
main = "worker.js"
compatibility_date = "2024-11-01"

[env.production]
routes = [
  # CMP y consentimiento solo en dominio www
  { pattern = "www.learnsocialstudies.com/*", zone_name = "learnsocialstudies.com" },
  # Asegurar /cmp/* aunque algún día cambies estructura
  { pattern = "www.learnsocialstudies.com/cmp/*", zone_name = "learnsocialstudies.com" },
]
